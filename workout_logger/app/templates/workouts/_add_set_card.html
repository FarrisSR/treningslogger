<section class="card">
  <h2>Legg til flere sett</h2>
  {% if plan_exercise_items %}
    <p class="muted">Planøvelser vises først med targets og fremdrift. Du kan fortsatt logge en ekstra øvelse ved behov.</p>
  {% endif %}
  <form method="post" action="{{ url_for('workouts.add_set', workout_id=workout.id) }}" class="grid" id="add-set-form">
    <div>
      <label for="exercise_id">Exercise</label>
      <select id="exercise_id" name="exercise_id">
        <option value="">Velg en øvelse</option>
        {% if plan_exercise_items %}
          <optgroup label="Plan Exercises">
            {% for item in plan_exercise_items %}
              {% set exercise = item.exercise %}
              <option value="{{ exercise.id }}"
                      data-next-set="{{ item.next_set_no }}"
                      data-target-sets="{{ item.target_sets or '' }}"
                      data-target-reps="{{ item.target_reps or '' }}"
                      data-logged-sets="{{ item.logged_sets }}"
                      data-suggested-reps="{{ item.suggested_reps if item.suggested_reps is not none else '' }}"
                      data-suggested-duration="{{ item.suggested_duration_seconds if item.suggested_duration_seconds is not none else '' }}"
                      data-target-mode="{{ item.target_mode }}"
                      {% if selected_exercise_id == exercise.id %}selected{% endif %}>
                {{ exercise.name }}
                {% if item.target_sets or item.target_reps %}
                  ({{ item.target_sets or '' }}{% if item.target_sets and item.target_reps %} x {% endif %}{{ item.target_reps or '' }})
                {% endif %}
                {% if item.target_sets %}
                  · {{ item.logged_sets }}/{{ item.target_sets }} sets
                {% endif %}
              </option>
            {% endfor %}
          </optgroup>
          {% if other_exercises %}
          <optgroup label="Other Exercises">
            {% for exercise in other_exercises %}
              <option value="{{ exercise.id }}"
                      data-next-set="{{ next_set_no_by_exercise.get(exercise.id, 1) }}"
                      data-suggested-reps=""
                      data-suggested-duration=""
                      data-target-mode="reps"
                      {% if selected_exercise_id == exercise.id %}selected{% endif %}>
                {{ exercise.name }}
              </option>
            {% endfor %}
          </optgroup>
          {% endif %}
        {% else %}
          {% for exercise in exercises %}
            <option value="{{ exercise.id }}"
                    data-next-set="{{ next_set_no_by_exercise.get(exercise.id, 1) }}"
                    data-suggested-reps=""
                    data-suggested-duration=""
                    data-target-mode="reps"
                    {% if selected_exercise_id == exercise.id %}selected{% endif %}>
              {{ exercise.name }}
            </option>
          {% endfor %}
        {% endif %}
      </select>
      <div id="exercise-plan-meta" class="muted add-set-meta"></div>
    </div>
    <div>
      <label for="exercise_name">Eller opprett øvelse</label>
      <input id="exercise_name" name="exercise_name" placeholder="f.eks. Incline DB Press">
    </div>
    <div class="inline">
      <div>
        <label for="set_no">Sett #</label>
        <input id="set_no" name="set_no" type="number" min="1" value="{{ selected_set_no }}" required>
      </div>
      <div id="reps-field">
        <label for="reps">Reps</label>
        <input id="reps" name="reps" type="number" min="0" step="1" required>
      </div>
      <div id="duration-field" hidden>
        <label for="duration_seconds">Varighet (sek)</label>
        <input id="duration_seconds" name="duration_seconds" type="number" min="1" step="1">
      </div>
      <div id="weight-field">
        <label for="weight_kg">Vekt (kg)</label>
        <input id="weight_kg" name="weight_kg" type="number" min="0" step="0.5" required>
      </div>
      <div>
        <label for="rpe">RPE</label>
        <input id="rpe" name="rpe" type="number" min="0" max="10" step="0.5">
      </div>
    </div>
    <button type="submit">Legg til sett</button>
  </form>
</section>
