{% extends 'base.html' %}
{% block title %}New Workout | Workout Logger{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <h1>New Workout</h1>
  <form method="post" class="grid">
    <div>
      <label for="title">Title</label>
      <input id="title" name="title" required>
    </div>
    <div class="grid grid-2">
      <div>
        <label for="workout_date">Date</label>
        <input id="workout_date" name="workout_date" type="date">
      </div>
      <div>
        <label for="duration_minutes">Duration (min)</label>
        <input id="duration_minutes" name="duration_minutes" type="number" min="0" step="1">
      </div>
    </div>
    <div>
      <label for="plan_id">Plan (optional)</label>
      <select id="plan_id" name="plan_id">
        <option value="">None</option>
        {% for plan in plans %}
          <option value="{{ plan.id }}">{{ plan.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="notes">Workout Notes</label>
      <textarea id="notes" name="notes" rows="4"></textarea>
    </div>
    <button type="submit">Create Workout</button>
  </form>
</div>
{% endblock %}
