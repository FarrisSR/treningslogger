{% extends 'base.html' %}
{% block title %}New Plan | Workout Logger{% endblock %}
{% block content %}
<div class="card" style="max-width:800px;">
  <h1>Create Plan</h1>
  <form method="post" class="grid">
    <div>
      <label for="name">Plan Name</label>
      <input id="name" name="name" required>
    </div>
    <div>
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="3"></textarea>
    </div>
    <div>
      <label for="exercises">Exercises (one per line)</label>
      <textarea id="exercises" name="exercises" rows="8" placeholder="Squat|5|5\nBench Press|5|5\nRow|4|8-10"></textarea>
      <p class="muted">Format: <code>Exercise</code> or <code>Exercise|target_sets|target_reps</code>.</p>
    </div>
    <button type="submit">Save Plan</button>
  </form>
</div>
{% endblock %}
